name: TeleprompterPro
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.17.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  OpenClawKit:
    url: https://github.com/Diomandeee/OpenClawKit
    exactVersion: "1.0.2"

settings:
  base:
    SWIFT_VERSION: "5"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  TeleprompterPro:
    type: application
    platform: iOS
    sources:
      - path: TeleprompterPro
    resources:
      - path: TeleprompterPro/Assets.xcassets
    info:
      path: TeleprompterPro/Info.plist
      properties:
        CFBundleDisplayName: "Teleprompter Pro"
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Teleprompter Pro uses the camera to record videos while displaying your script."
        NSMicrophoneUsageDescription: "Teleprompter Pro uses the microphone to capture audio during recording."
        NSLocalNetworkUsageDescription: "Teleprompter Pro uses the local network for connectivity features."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.teleprompterpro
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8643C988C4"
    developmentTeam: "8643C988C4"
    dependencies:
      - package: ComposableArchitecture
      - package: Supabase
      - package: OpenClawKit
        product: OpenClawCore
      - package: OpenClawKit
        product: OpenClawSupabase

  TeleprompterProTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TeleprompterProTests
    dependencies:
      - target: TeleprompterPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.teleprompterpro.tests
